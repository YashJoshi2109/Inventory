# Local / Docker dev — Eclipse Mosquitto for SEAR Lab Inventory MQTT
# Production: use managed MQTT (HiveMQ Cloud, AWS IoT, Azure Event Grid, EMQX) with TLS + auth.

listener 1883 0.0.0.0
allow_anonymous true

# Optional WebSocket (browser clients)
# listener 9001 0.0.0.0
# protocol websockets

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
