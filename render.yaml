services:
  - type: web
    name: sierlab-inventory-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: POSTGRES_HOST
        value: aws-1-us-east-1.pooler.supabase.com
      - key: POSTGRES_PORT
        value: "5432"
      - key: POSTGRES_DB
        value: postgres
      - key: POSTGRES_USER
        value: postgres.vcyvsjasentcicsnpylz
      - key: POSTGRES_PASSWORD
        sync: false          # set manually in Render dashboard
      - key: DATABASE_SSL
        value: "true"
      - key: SECRET_KEY
        sync: false          # set manually in Render dashboard
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: CORS_ORIGINS
        sync: false          # set after Vercel URL is known
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: BARCODE_DIR
        value: /tmp/uploads/barcodes
      - key: MAX_UPLOAD_SIZE_MB
        value: "50"
      - key: AI_ANOMALY_DETECTION_ENABLED
        value: "true"
      - key: AI_FORECAST_ENABLED
        value: "true"
      - key: MQTT_ENABLED
        value: "true"
      - key: MQTT_BROKER_HOST
        value: wef11e03.ala.us-east-1.emqxsl.com
      - key: MQTT_BROKER_PORT
        value: "8883"
      - key: MQTT_USE_TLS
        value: "true"
      - key: MQTT_USERNAME
        value: ma02011f
      # EMQX App Secret — set in Render dashboard (do not commit)
      - key: MQTT_PASSWORD
        sync: false
      - key: MQTT_TOPIC_PREFIX
        value: searlab/inventory
      - key: MQTT_QOS
        value: "1"
      - key: ALERT_EMAIL_ENABLED
        value: "false"
      # ── AI / Gemini (required for copilot + smart scan) ──
      - key: GEMINI_API_KEY
        sync: false          # set manually in Render dashboard
      - key: GEMINI_CHAT_MODEL
        value: gemini-2.0-flash
      - key: GEMINI_VISION_MODEL
        value: gemini-2.0-flash
      - key: GEMINI_VISION_FALLBACK_MODELS_RAW
        value: "gemini-1.5-flash,gemini-1.5-pro"
      # ── WebAuthn / Passkeys ──
      # Set RP_ID to your Vercel domain, e.g. inventory-brown-beta.vercel.app
      - key: WEBAUTHN_RP_ID
        sync: false          # e.g. inventory-brown-beta.vercel.app
      - key: WEBAUTHN_ORIGINS
        sync: false          # e.g. https://inventory-brown-beta.vercel.app
