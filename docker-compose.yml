version: "3.9"

# ─── SIER Lab Inventory — Production Docker Compose ───────────────────────────
#
# Database: Supabase (cloud PostgreSQL) — no local db service needed
# Services:
#   backend  — FastAPI (uvicorn, 4 workers)
#   frontend — Vite build served by Nginx
#   mqtt     — Eclipse Mosquitto (Phase 2 MQTT broker — disabled in Phase 1)
#
# Startup order: backend → frontend
# Copy .env.example to .env and fill in Supabase credentials before running.

services:

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      # Supabase connection — override these in .env
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_SSL: "true"
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost:3000","http://localhost:5173","http://localhost:80"]'}
      UPLOAD_DIR: /app/uploads
      BARCODE_DIR: /app/uploads/barcodes
      MQTT_ENABLED: "false"
      AI_ANOMALY_DETECTION_ENABLED: "true"
      AI_FORECAST_ENABLED: "true"
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: >
      sh -c "
        echo 'Running Alembic migrations against Supabase...' &&
        alembic upgrade head &&
        echo 'Starting Uvicorn...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
      "

  # ── React/Vite Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Eclipse Mosquitto MQTT Broker (Phase 2 — disabled by default) ─────────
  # Uncomment and set MQTT_ENABLED=true in .env to activate Phase 2 MQTT
  #
  # mqtt:
  #   image: eclipse-mosquitto:2
  #   restart: unless-stopped
  #   volumes:
  #     - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
  #     - mqtt_data:/mosquitto/data
  #     - mqtt_logs:/mosquitto/log
  #   ports:
  #     - "1883:1883"
  #     - "9001:9001"   # WebSocket port for browser MQTT clients

volumes:
  uploads_data:
    driver: local
  # mqtt_data:
  # mqtt_logs:

networks:
  default:
    name: sierlab_network
