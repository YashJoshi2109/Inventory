name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: false
        default: "both"
        type: choice
        options: [both, frontend, backend]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # Never cancel in-flight deploys

jobs:
  # ── Verify build passes before deploying ─────────────────────────────────────
  verify:
    name: Verify build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Production build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: /api/v1
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-deploy
          path: frontend/dist/
          retention-days: 1

  # ── Deploy frontend to Vercel ─────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy → Vercel
    runs-on: ubuntu-latest
    needs: verify
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'both' || inputs.target == 'frontend'))
    environment:
      name: production-frontend
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          URL=$(vercel --prod --yes --token "$VERCEL_TOKEN" 2>&1 | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $URL"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Trigger Render backend redeploy ──────────────────────────────────────────
  deploy-backend:
    name: Deploy → Render
    runs-on: ubuntu-latest
    needs: verify
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'both' || inputs.target == 'backend'))
    environment:
      name: production-backend

    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping Render deploy"
            exit 0
          fi
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL")
          echo "Render deploy hook status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" != "2"* ]]; then
            echo "Render deploy hook returned non-2xx: $HTTP_STATUS"
            exit 1
          fi
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

  # ── Post-deploy smoke test ────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always() && (needs.deploy-frontend.result == 'success' || needs.deploy-backend.result == 'success')

    steps:
      - name: Health check backend
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL not set — skipping smoke test"
            exit 0
          fi
          for i in 1 2 3; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/health" || echo "000")
            echo "Attempt $i: $HTTP"
            if [[ "$HTTP" == "200" ]]; then exit 0; fi
            sleep 15
          done
          echo "Backend health check failed after 3 attempts"
          exit 1
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
