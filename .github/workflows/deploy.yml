name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: false
        default: "both"
        type: choice
        options: [both, frontend, backend]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # Never cancel in-flight deploys

env:
  PROJECT: gen-lang-client-0602255200
  REGION: us-central1
  IMAGE: us-central1-docker.pkg.dev/gen-lang-client-0602255200/inventory-backend/api
  CLOUDRUN_SERVICE: inventory-backend
  RUNTIME_SA: inventory-backend-sa@gen-lang-client-0602255200.iam.gserviceaccount.com

jobs:
  # ── Verify frontend build passes before deploying ────────────────────────────
  verify:
    name: Verify build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Production build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: /api/v1
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-deploy
          path: frontend/dist/
          retention-days: 1

  # ── Deploy frontend to Vercel ─────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy → Vercel
    runs-on: ubuntu-latest
    needs: verify
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'both' || inputs.target == 'frontend'))
    environment:
      name: production-frontend
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          URL=$(vercel --prod --yes --token "$VERCEL_TOKEN" 2>&1 | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $URL"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Build + deploy backend to GCP Cloud Run ──────────────────────────────────
  deploy-backend:
    name: Deploy → GCP Cloud Run
    runs-on: ubuntu-latest
    needs: verify
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'both' || inputs.target == 'backend'))
    environment:
      name: production-backend

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t "$IMAGE:${{ github.sha }}" \
            -t "$IMAGE:latest" \
            backend/
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$CLOUDRUN_SERVICE" \
            --image="$IMAGE:${{ github.sha }}" \
            --region="$REGION" \
            --platform=managed \
            --allow-unauthenticated \
            --service-account="$RUNTIME_SA" \
            --port=8000 \
            --min-instances=1 \
            --max-instances=5 \
            --memory=1Gi \
            --cpu=1 \
            --timeout=300 \
            --concurrency=80 \
            --command="sh" \
            --args="-c,alembic upgrade head; uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1" \
            --set-env-vars="\
          DATABASE_SSL=true,\
          GCS_BUCKET_NAME=sierlab-inv-uploads,\
          ENVIRONMENT=production,\
          POSTGRES_HOST=${{ secrets.POSTGRES_HOST }},\
          POSTGRES_PORT=5432,\
          POSTGRES_DB=postgres,\
          POSTGRES_USER=${{ secrets.POSTGRES_USER }},\
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }},\
          SECRET_KEY=${{ secrets.SECRET_KEY }},\
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},\
          GEMINI_CHAT_MODEL=gemini-2.0-flash,\
          GEMINI_VISION_MODEL=gemini-2.0-flash,\
          GEMINI_VISION_FALLBACK_MODELS_RAW=gemini-1.5-flash,\
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }},\
          OPENROUTER_MODEL=meta-llama/llama-3.1-8b-instruct:free,\
          WEBAUTHN_RP_ID=inventory-brown-beta.vercel.app,\
          WEBAUTHN_ORIGINS=https://inventory-brown-beta.vercel.app,\
          CORS_ORIGINS=[\"https://inventory-brown-beta.vercel.app\"],\
          CORS_ORIGIN_REGEX=^https://.*\\.vercel\\.app$,\
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }},\
          BREVO_SENDER_EMAIL=${{ secrets.BREVO_SENDER_EMAIL }},\
          BREVO_SENDER_NAME=SEAR Lab Inventory,\
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }},\
          RESEND_FROM_EMAIL=onboarding@resend.dev,\
          RESEND_ENABLE_TRANSFER=true,\
          SMTP_ENABLED=false,\
          MQTT_ENABLED=true,\
          MQTT_BROKER_HOST=${{ secrets.MQTT_BROKER_HOST }},\
          MQTT_BROKER_PORT=8883,\
          MQTT_USERNAME=${{ secrets.MQTT_USERNAME }},\
          MQTT_PASSWORD=${{ secrets.MQTT_PASSWORD }},\
          MQTT_USE_TLS=true,\
          MQTT_QOS=1,\
          MQTT_TOPIC_PREFIX=searlab/inventory,\
          UPLOAD_DIR=/tmp/uploads,\
          BARCODE_DIR=/tmp/uploads/barcodes,\
          AI_ANOMALY_DETECTION_ENABLED=true,\
          AI_FORECAST_ENABLED=true,\
          ALERT_EMAIL_ENABLED=false"

  # ── Post-deploy smoke test ────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always() && (needs.deploy-frontend.result == 'success' || needs.deploy-backend.result == 'success')

    steps:
      - name: Health check backend (Cloud Run)
        run: |
          BACKEND="https://inventory-backend-nqpxz6tuka-uc.a.run.app"
          for i in 1 2 3; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND/ping" || echo "000")
            echo "Attempt $i: $HTTP"
            if [[ "$HTTP" == "200" ]]; then exit 0; fi
            sleep 15
          done
          echo "Backend health check failed after 3 attempts"
          exit 1
